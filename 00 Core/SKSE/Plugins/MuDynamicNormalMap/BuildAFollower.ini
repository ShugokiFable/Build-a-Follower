; Build a Follower 2.4.2 compatibility for Mu Dynamic NormalMap.
; BAF applies RaceMenu skin/normal overrides at runtime. Mu's real-time normal
; pass can otherwise overwrite them immediately after Apply/Fix, producing the
; characteristic one-frame match followed by a head/body shading mismatch.
;
; This condition disables Mu only for BAF's 160 template actor bases. Mu remains
; enabled for the player and every other NPC.

Condition = HasKeywordEditorID(BAF_MuDynamicNormalMapExclude)
Enable = false
HeadEnable = false
Priority = 2147483647
